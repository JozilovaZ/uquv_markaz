<script type="text/babel">
const { useState, useEffect } = React;
const API = '/api';
const ROLE_PATH = { admin:'/admin', manager:'/manager', teacher:'/teacher', user:'/student', student:'/student' };
function toDashboard(role) { window.location.href = ROLE_PATH[role] || '/student'; }

async function apiFetch(path, opts={}) {
  const token = localStorage.getItem('token');
  const res = await fetch(`${API}${path}`, {
    headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})},
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error||'Xatolik');
  return data;
}
const fmtPrice = p => new Intl.NumberFormat('uz-UZ').format(p)+" so'm";
function Icon({name,className='',fill=0,size=24}) {
  return <span className={`material-symbols-outlined ${className}`} style={{fontVariationSettings:`'FILL' ${fill},'wght' 400,'GRAD' 0,'opsz' ${size}`}}>{name}</span>;
}
function Spinner() { return <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"/></div>; }
function Stars({n=5}) { return <div className="flex gap-1">{Array.from({length:n}).map((_,i)=><Icon key={i} name="star" fill={1} className="text-[#FFC107] text-[18px]"/>)}</div>; }
const CAT_ICON = {IT:'laptop',Til:'translate',Dizayn:'brush',Fan:'science',Marketing:'campaign',default:'school'};
const COURSE_IMGS = {
  IT:        'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?auto=format&fit=crop&w=600&q=80',
  Til:       'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=600&q=80',
  Dizayn:    'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=600&q=80',
  Fan:       'https://images.unsplash.com/photo-1532094349884-543559c05671?auto=format&fit=crop&w=600&q=80',
  Marketing: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=600&q=80',
  default:   'https://images.unsplash.com/photo-1501504905252-473c47e087f8?auto=format&fit=crop&w=600&q=80',
};
const TEACHER_PHOTOS = [
  'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=300&q=80',
  'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=300&q=80',
];
function tPhoto(t){ return t.image||TEACHER_PHOTOS[(t.id-1)%TEACHER_PHOTOS.length]; }

// ─── NAVBAR ───────────────────────────────────────────────────────────────────
function Navbar({page,setPage,user,setUser,dark,setDark}) {
  const [open,setOpen] = useState(false);
  const [drop,setDrop] = useState(false);
  const [notifs,setNotifs] = useState([]);
  const [showNotifs,setShowNotifs] = useState(false);
  const links=[['home','Asosiy'],['courses','Kurslar'],['teachers','Ustozlar'],['about','Biz haqimizda'],['contact','Aloqa']];

  useEffect(()=>{
    if(user){
      const token=localStorage.getItem('token');
      fetch('/api/notifications',{headers:token?{Authorization:`Bearer ${token}`}:{}})
        .then(r=>r.ok?r.json():[]).then(setNotifs).catch(()=>{});
    } else { setNotifs([]); }
  },[user]);

  function markRead(n){
    if(n.is_read) return;
    const token=localStorage.getItem('token');
    fetch(`/api/notifications/${n.id}/read`,{method:'PUT',headers:{Authorization:`Bearer ${token}`}});
    setNotifs(ns=>ns.map(x=>x.id===n.id?{...x,is_read:1}:x));
  }
  function logout(){localStorage.removeItem('token');localStorage.removeItem('user');setUser(null);setPage('home');setDrop(false);}
  return (
    <header className="bg-white/80 dark:bg-[#0d0d1a]/90 backdrop-blur-xl border-b border-gray-100 dark:border-white/5 sticky top-0 z-40 h-16 sm:h-18 flex items-center px-4 sm:px-8 shadow-sm">
      <div className="w-full max-w-7xl mx-auto flex items-center justify-between gap-4">
        <button onClick={()=>setPage('home')} className="font-extrabold text-xl text-primary tracking-tight flex-shrink-0">EduCore</button>

        {/* Desktop nav */}
        <nav className="hidden md:flex items-center gap-6 lg:gap-8">
          {links.map(([id,lbl])=>(
            <button key={id} onClick={()=>setPage(id)} className={`text-sm font-semibold transition-all pb-0.5 ${page===id?'text-primary border-b-2 border-primary':'text-secondary dark:text-gray-400 hover:text-primary'}`}>{lbl}</button>
          ))}
        </nav>

        {/* Desktop right */}
        <div className="hidden md:flex items-center gap-2">
          <button onClick={()=>setDark(d=>!d)} title={dark?'Kunduz':'Tun'} className="p-2 rounded-xl text-secondary dark:text-gray-400 hover:bg-primary/10 dark:hover:bg-white/8 transition-all">
            <Icon name={dark?'light_mode':'dark_mode'} className="text-[20px]"/>
          </button>
          {user&&(
            <div className="relative">
              <button onClick={()=>setShowNotifs(v=>!v)} className="relative p-2 rounded-xl text-secondary dark:text-gray-400 hover:bg-primary/10 dark:hover:bg-white/8 transition-all">
                <Icon name="notifications" fill={notifs.some(n=>!n.is_read)?1:0} className="text-[20px]"/>
                {notifs.filter(n=>!n.is_read).length>0&&<span className="absolute top-0.5 right-0.5 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">{notifs.filter(n=>!n.is_read).length}</span>}
              </button>
              {showNotifs&&(
                <div className="absolute right-0 mt-2 w-80 bg-white dark:bg-[#1a1a2e] rounded-2xl shadow-2xl border border-gray-100 dark:border-white/10 overflow-hidden z-50">
                  <div className="px-4 py-3 border-b border-gray-100 dark:border-white/10 flex items-center justify-between">
                    <h4 className="font-bold text-sm text-on-surface dark:text-white">Bildirishnomalar</h4>
                    {notifs.filter(n=>!n.is_read).length>0&&<span className="text-xs text-primary font-semibold">{notifs.filter(n=>!n.is_read).length} yangi</span>}
                  </div>
                  {notifs.length===0?(
                    <div className="py-10 text-center text-sm text-secondary dark:text-gray-400">
                      <Icon name="notifications_none" className="text-[40px] block mx-auto mb-2 text-gray-300 dark:text-gray-600"/>
                      Bildirishnoma yo'q
                    </div>
                  ):(
                    <div className="max-h-72 overflow-y-auto divide-y divide-gray-50 dark:divide-white/5">
                      {notifs.map(n=>(
                        <div key={n.id} onClick={()=>markRead(n)} className={`px-4 py-3 cursor-pointer hover:bg-gray-50 dark:hover:bg-white/5 transition-colors ${!n.is_read?'bg-primary/5 dark:bg-primary/10':''}`}>
                          <div className="flex items-start gap-2">
                            <Icon name={n.message.includes('Tabrik')?'check_circle':'info'} fill={1} className={`text-[18px] mt-0.5 flex-shrink-0 ${n.message.includes('Tabrik')?'text-green-500':'text-orange-400'}`}/>
                            <div className="flex-1 min-w-0">
                              <p className={`text-xs leading-relaxed ${!n.is_read?'font-semibold text-on-surface dark:text-white':'text-secondary dark:text-gray-400'}`}>{n.message}</p>
                              <p className="text-[10px] text-gray-400 mt-1">{new Date(n.created_at).toLocaleString()}</p>
                            </div>
                            {!n.is_read&&<span className="w-2 h-2 bg-primary rounded-full flex-shrink-0 mt-1"/>}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
          {user ? (
            <div className="relative">
              <button onClick={()=>setDrop(d=>!d)} className="flex items-center gap-2 bg-primary/10 dark:bg-primary/20 hover:bg-primary/20 dark:hover:bg-primary/30 px-3 py-2 rounded-xl transition-all">
                <div className="w-7 h-7 rounded-full bg-primary text-white flex items-center justify-center font-bold text-sm">{user.firstName[0].toUpperCase()}</div>
                <span className="text-sm font-semibold dark:text-gray-200 max-w-[100px] truncate">{user.firstName}</span>
                <Icon name="expand_more" className="text-secondary dark:text-gray-400 text-[18px]"/>
              </button>
              {drop&&(
                <div className="absolute right-0 mt-2 w-52 bg-white dark:bg-[#1a1a2e] rounded-2xl shadow-2xl border border-gray-100 dark:border-white/8 py-2 z-50">
                  <div className="px-4 py-2 border-b border-gray-100 dark:border-white/8 mb-1">
                    <div className="text-sm font-bold dark:text-white">{user.firstName}</div>
                    <div className="text-xs text-secondary dark:text-gray-400">{user.email||user.role}</div>
                  </div>
                  <button onClick={()=>{toDashboard(user.role);setDrop(false);}} className="w-full text-left px-4 py-2.5 text-sm text-primary font-semibold hover:bg-primary/5 dark:hover:bg-primary/10 flex items-center gap-3"><Icon name="dashboard" className="text-[18px]"/>Panelim</button>
                  <button onClick={()=>{setPage('profile');setDrop(false);}} className="w-full text-left px-4 py-2.5 text-sm text-on-surface dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 flex items-center gap-3"><Icon name="person" className="text-[18px] text-secondary"/>Profilim</button>
                  <div className="border-t border-gray-100 dark:border-white/8 my-1"/>
                  <button onClick={logout} className="w-full text-left px-4 py-2.5 text-sm text-error hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-3"><Icon name="logout" className="text-[18px]"/>Chiqish</button>
                </div>
              )}
            </div>
          ) : (
            <div className="flex items-center gap-2">
              <button onClick={()=>setPage('login')} className="border border-gray-200 dark:border-gray-600 text-on-surface dark:text-gray-200 px-4 py-1.5 rounded-xl text-sm font-semibold hover:bg-gray-50 dark:hover:bg-white/5 transition-all">Kirish</button>
              <button onClick={()=>setPage('register')} className="bg-primary text-white px-4 py-1.5 rounded-xl text-sm font-semibold hover:bg-primary/90 active:scale-95 transition-all shadow-md shadow-primary/25">Ro'yxatdan o'tish</button>
            </div>
          )}
        </div>

        {/* Mobile right */}
        <div className="md:hidden flex items-center gap-1">
          <button onClick={()=>setDark(d=>!d)} className="p-2 rounded-lg text-secondary dark:text-gray-400"><Icon name={dark?'light_mode':'dark_mode'} className="text-[20px]"/></button>
          <button onClick={()=>setOpen(o=>!o)} className="p-2 rounded-lg text-secondary dark:text-gray-400"><Icon name={open?'close':'menu'}/></button>
        </div>
      </div>

      {/* Mobile menu */}
      {open&&(
        <div className="absolute top-full left-0 right-0 bg-white/97 dark:bg-[#0d0d1a]/97 backdrop-blur-xl border-b border-gray-100 dark:border-white/5 px-4 py-3 flex flex-col gap-1 md:hidden shadow-lg z-50">
          {links.map(([id,lbl])=>(
            <button key={id} onClick={()=>{setPage(id);setOpen(false);}} className={`text-left px-4 py-3 rounded-xl text-sm font-medium ${page===id?'bg-primary/10 text-primary':'text-secondary dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5'}`}>{lbl}</button>
          ))}
          <div className="border-t border-gray-100 dark:border-white/8 mt-1 pt-2">
            {user ? (
              <>
                <div className="flex items-center gap-3 px-4 py-2 mb-1">
                  <div className="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center font-bold text-sm">{user.firstName[0]}</div>
                  <div><div className="text-sm font-bold dark:text-white">{user.firstName}</div><div className="text-xs text-secondary">{user.role}</div></div>
                </div>
                <button onClick={()=>{toDashboard(user.role);}} className="w-full text-left px-4 py-2.5 text-sm font-semibold text-primary rounded-xl flex items-center gap-2"><Icon name="dashboard" className="text-[16px]"/>Panelim</button>
                <button onClick={()=>{setPage('profile');setOpen(false);}} className="w-full text-left px-4 py-2.5 text-sm dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl">Profilim</button>
                <button onClick={()=>{logout();setOpen(false);}} className="w-full text-left px-4 py-2.5 text-sm text-error rounded-xl mt-1">Chiqish</button>
              </>
            ) : (
              <div className="flex flex-col gap-2 pb-1">
                <button onClick={()=>{setPage('login');setOpen(false);}} className="w-full text-center py-3 text-sm font-semibold border border-gray-200 dark:border-gray-700 rounded-xl dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-white/5">Kirish</button>
                <button onClick={()=>{setPage('register');setOpen(false);}} className="w-full bg-primary text-white py-3 rounded-xl text-sm font-bold text-center">Ro'yxatdan o'tish</button>
              </div>
            )}
          </div>
        </div>
      )}
    </header>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomePage({setPage,setSelectedCourse,user}) {
  const [courses,setCourses] = useState([]);
  const [teachers,setTeachers] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    Promise.all([apiFetch('/courses'),apiFetch('/teachers')])
      .then(([c,t])=>{setCourses(c);setTeachers(t);})
      .finally(()=>setLoading(false));
  },[]);

              <button onClick={()=>setPage('courses')} className="bg-primary text-white px-6 sm:px-8 py-3 rounded-xl text-base font-bold shadow-xl shadow-primary/30 active:scale-95 transition-all">Kursni tanlash</button>

            </div>
            <div className="flex items-center gap-4 pt-2">
              <div className="flex -space-x-3">
                {['bg-primary','bg-tertiary','bg-secondary'].map((c,i)=>(
                  <div key={i} className={`w-10 h-10 rounded-full border-2 border-white dark:border-gray-900 ${c} flex items-center justify-center text-white font-bold text-sm`}>{['A','B','C'][i]}</div>

// ─── COURSES PAGE ─────────────────────────────────────────────────────────────
function CoursesPage({setPage,setSelectedCourse}) {
  const [courses,setCourses] = useState([]);
  const [loading,setLoading] = useState(true);
  const [search,setSearch] = useState('');
  const [cat,setCat] = useState('Barchasi');
  const [sort,setSort] = useState('default');
  const [favs,setFavs] = useState(()=>JSON.parse(localStorage.getItem('favs')||'[]'));

  useEffect(()=>{apiFetch('/courses').then(setCourses).finally(()=>setLoading(false));},[]);
  function toggleFav(id){const u=favs.includes(id)?favs.filter(f=>f!==id):[...favs,id];setFavs(u);localStorage.setItem('favs',JSON.stringify(u));}

  const cats=['Barchasi','IT','Til','Dizayn','Fan','Marketing'];
  let filtered=courses.filter(c=>{const s=search.toLowerCase();return(cat==='Barchasi'||c.category===cat)&&(c.title.toLowerCase().includes(s)||c.center.toLowerCase().includes(s));});
  if(sort==='price_asc') filtered=[...filtered].sort((a,b)=>a.price-b.price);
  if(sort==='price_desc') filtered=[...filtered].sort((a,b)=>b.price-a.price);
  if(sort==='rating') filtered=[...filtered].sort((a,b)=>b.rating-a.rating);

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-8 py-10 sm:py-16">
      <div className="mb-10">
        <span className="text-primary text-xs font-bold uppercase tracking-[0.2em]">Barcha yo'nalishlar</span>
        <h1 className="text-2xl sm:text-headline-lg text-on-surface dark:text-white mt-1 mb-4">Kurslar katalogi</h1>
        <div className="flex flex-col sm:flex-row gap-3">
          <div className="relative flex-1">
            <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-secondary dark:text-gray-400 text-[20px]"/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Kurs yoki markaz nomi..."
              className="w-full pl-12 pr-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-white dark:bg-gray-800 dark:text-gray-100"/>
          </div>
          <select value={sort} onChange={e=>setSort(e.target.value)} className="border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-white dark:bg-gray-800 dark:text-gray-100">
            <option value="default">Saralash</option>
            <option value="price_asc">Narx: arzondan</option>
            <option value="price_desc">Narx: qimmatdan</option>
            <option value="rating">Reyting bo'yicha</option>
          </select>
        </div>
      </div>
      <div className="flex gap-2 flex-wrap mb-6">
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${cat===c?'bg-primary text-white shadow':'bg-white dark:bg-gray-800 text-secondary dark:text-gray-400 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700'}`}>{c}</button>
        ))}
        <span className="ml-auto text-xs text-secondary dark:text-gray-400 self-center">{filtered.length} ta kurs</span>
      </div>
      {loading?<Spinner/>:filtered.length===0?(
        <div className="text-center py-20 text-secondary dark:text-gray-400">
          <Icon name="search_off" className="text-[56px] text-gray-300 dark:text-gray-600 mb-3 block mx-auto"/>
          <p className="text-xl font-semibold">Kurs topilmadi</p>
        </div>
      ):(
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          {filtered.map(c=><CourseCard key={c.id} course={c} fav={favs.includes(c.id)} onFav={()=>toggleFav(c.id)} onClick={()=>{setSelectedCourse(c);setPage('courseDetail');}}/>)}
        </div>
      )}
    </div>
  );
}

function CourseDetailPage({course,setPage,user}) {
  const [enrolled,setEnrolled] = useState(false);
  const [enrollId,setEnrollId] = useState(null);
  const [feedbacks,setFeedbacks] = useState([]);
  const [comment,setComment] = useState('');
  const [rating,setRating] = useState(5);
  const [msg,setMsg] = useState('');

  useEffect(()=>{
    apiFetch(`/feedbacks?course_id=${course.id}`).then(setFeedbacks).catch(()=>{});
    if(user){apiFetch('/enrollments').then(data=>{const e=data.find(e=>e.course_id===course.id);if(e){setEnrolled(true);setEnrollId(e.id);}}).catch(()=>{});}
  },[course.id]);

  async function handleEnroll(){
    if(!user){setMsg('⚠️ Avval tizimga kiring!');return;}
    try{await apiFetch('/enrollments',{method:'POST',body:JSON.stringify({course_id:course.id})});setEnrolled(true);setMsg('✅ Kursga muvaffaqiyatli yozildingiz!');}
    catch(e){setMsg('❌ '+e.message);}
  }
  async function handleUnenroll(){
    await apiFetch(`/enrollments/${enrollId}`,{method:'DELETE'});
    setEnrolled(false);setEnrollId(null);setMsg("Kursdan chiqildingiz");
  }
  async function submitFeedback(e){
    e.preventDefault();
    if(!user){setMsg('⚠️ Fikr qoldirish uchun kiring!');return;}
    try{
      await apiFetch('/feedbacks',{method:'POST',body:JSON.stringify({course_id:course.id,rating,comment})});
      setComment('');setRating(5);
      const d=await apiFetch(`/feedbacks?course_id=${course.id}`);setFeedbacks(d);setMsg('✅ Fikr qoldirildi!');
    }catch(e){setMsg('❌ '+e.message);}
  }
  const icon=CAT_ICON[course.category]||CAT_ICON.default;
  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-8 py-8 sm:py-12">
      <button onClick={()=>setPage('courses')} className="flex items-center gap-1 text-primary text-sm font-medium mb-8 hover:gap-2 transition-all">

        <div className="bg-gradient-to-br from-primary to-tertiary p-8 sm:p-10 text-white flex flex-col sm:flex-row items-start sm:items-center gap-6">
          <div className="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center flex-shrink-0">
            <Icon name={icon} className="text-[44px] text-white"/>
          </div>
          <div className="flex-1">
            <span className="bg-white/20 text-white text-xs font-bold px-3 py-1 rounded-full mb-2 inline-block">{course.category}</span>
            <h1 className="text-xl sm:text-headline-lg text-white mb-2">{course.title}</h1>
            <div className="flex flex-wrap items-center gap-4 text-sm opacity-80">
              <span className="flex items-center gap-1"><Icon name="location_on" className="text-[15px]"/>{course.center}</span>
              <span className="flex items-center gap-1"><Icon name="star" fill={1} className="text-[#FFC107] text-[15px]"/>{course.rating}</span>
              <span className="flex items-center gap-1"><Icon name="group" className="text-[15px]"/>{course.students}</span>
            </div>
          </div>
          <div className="text-right">
            <div className="text-2xl sm:text-3xl font-extrabold">{fmtPrice(course.price)}</div>
            <div className="text-xs opacity-70 mt-1">kurs narxi</div>
          </div>
        </div>
        <div className="p-6 sm:p-8 grid md:grid-cols-3 gap-8">
          <div className="md:col-span-2 space-y-6">
            <div>
              <h2 className="text-lg font-bold text-on-surface dark:text-white mb-3">Kurs haqida</h2>
              <p className="text-sm text-on-surface-variant dark:text-gray-400 leading-relaxed">{course.description}</p>
            </div>
            <div className="grid grid-cols-2 gap-3">
              {[['schedule','Davomiyligi',course.duration],['calendar_today','Kunlar',course.day],['access_time','Vaqt',course.time],['groups','Talabalar',course.students]].map(([ic,l,v])=>(
                <div key={l} className="bg-surface-container-low dark:bg-white/5 rounded-xl p-3 flex items-center gap-3">
                  <div className="w-9 h-9 bg-primary/10 rounded-lg flex items-center justify-center flex-shrink-0"><Icon name={ic} className="text-primary text-[18px]"/></div>
                  <div><div className="text-xs text-secondary dark:text-gray-400">{l}</div><div className="text-sm font-semibold text-on-surface dark:text-white">{v||'—'}</div></div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="bg-surface-container-low dark:bg-white/5 rounded-2xl p-5 space-y-4">
              <h3 className="text-base font-bold text-on-surface dark:text-white">Kursga yozilish</h3>
              {msg&&<div className={`text-sm px-3 py-2 rounded-lg ${msg.startsWith('✅')?'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400':'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400'}`}>{msg}</div>}
              {enrolled?(

              ):(

              )}

          <textarea value={comment} onChange={e=>setComment(e.target.value)} required rows={3} placeholder="Kurs haqida fikringiz..."

          <button type="submit" className="bg-primary text-white px-6 py-2.5 rounded-xl font-semibold text-sm hover:bg-primary/90 active:scale-95 transition-all">Yuborish</button>

        <div className="space-y-3">

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage] = useState('home');
  const [user,setUser] = useState(()=>{try{return JSON.parse(localStorage.getItem('user'));}catch{return null;}});
  const [selectedCourse,setSelectedCourse] = useState(null);
  const [dark,setDark] = useState(()=>localStorage.getItem('theme')==='dark');

  useEffect(()=>{
    const html=document.documentElement;
    if(dark){html.classList.add('dark');html.classList.remove('light');}
    else{html.classList.remove('dark');html.classList.add('light');}
    localStorage.setItem('theme',dark?'dark':'light');
  },[dark]);

  function navigate(p){setPage(p);window.scrollTo({top:0,behavior:'smooth'});}

  return (
    <div className="min-h-screen flex flex-col">
      <Navbar page={page} setPage={navigate} user={user} setUser={setUser} dark={dark} setDark={setDark}/>
      <main className="flex-1">
        {page==='home'&&<HomePage setPage={navigate} setSelectedCourse={setSelectedCourse} user={user}/>}
        {page==='courses'&&<CoursesPage setPage={navigate} setSelectedCourse={setSelectedCourse}/>}
        {page==='courseDetail'&&selectedCourse&&<CourseDetailPage course={selectedCourse} setPage={navigate} user={user}/>}
        {page==='teachers'&&<TeachersPage/>}
        {page==='contact'&&<ContactPage/>}
        {page==='about'&&<AboutPage setPage={navigate}/>}
        {page==='login'&&<LoginPage setPage={navigate} setUser={setUser}/>}
        {page==='register'&&<RegisterPage setPage={navigate} setUser={setUser}/>}
        {page==='profile'&&user&&<ProfilePage user={user} setPage={navigate}/>}
        {page==='admin'&&user?.role==='admin'&&<AdminPage user={user} setPage={navigate}/>}
      </main>
      <Footer setPage={navigate}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

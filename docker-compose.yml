version: "3.9"

services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - media_data:/app/media
      - sqlite_data:/app/sqlite
      - static_data:/app/staticfiles
      - frontend_dist:/app/frontend/dist
    environment:
      - DJANGO_SETTINGS_MODULE=kurstanla.settings
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-long-random-string}
      - DEBUG=${DEBUG:-False}
    expose:
      - "8000"
    command: >
      sh -c "cp -rn /app/frontend/dist/. /app/frontend/dist/ 2>/dev/null || true &&
             python manage.py migrate --noinput &&
             python -c 'from api.db import init_db; init_db()' &&
             python manage.py collectstatic --noinput &&
             gunicorn kurstanla.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8004:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
      - frontend_dist:/app/frontend/dist:ro
    depends_on:
      - web

volumes:
  media_data:
  sqlite_data:
  static_data:
  frontend_dist:
